<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surprise Recipe Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Surprise Recipe Finder</h1>
    <p>Type ingredients you have, or click “Surprise Me!”</p>
  </header>

  <main>
    <section class="search-box">
      <h2>Find a Recipe</h2>
      <input id="ingredientInput" type="text" placeholder="Example: chicken, rice, cheese">
      <button onclick="findRecipes()">Search</button>
      <button onclick="surpriseMe()">Surprise Me!</button>
    </section>

    <section id="animationBox"></section>

    <section id="recipeResults" class="recipes"></section>
  </main>

  <footer>
    <p>Created for my Web Development project</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
